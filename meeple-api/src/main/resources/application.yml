spring:
  application:
    name: meeple-api
  profiles:
    default: local
  jpa:
    # OSIV(Open Session In View)는 요청 전체 동안 영속성 컨텍스트/DB 커넥션을 붙잡아, 트래픽이 몰리면
    # 커넥션 풀 고갈·지연을 유발한다. 트랜잭션 경계 밖 지연 로딩을 차단해 조기에 드러내도록 끈다.
    # (조회는 @Transactional(readOnly) 서비스 또는 조회 시점에 완결되는 projection read model로 처리한다)
    open-in-view: false
  data:
    redis:
      # 명령 타임아웃. Redis가 느려지거나 응답 불능일 때 요청이 기본값(수십 초)만큼 매달리지 않고 빠르게 실패하게 한다.
      # 단일 활성 세션 검사는 실패 시 fail-open(허용)이라, 짧은 타임아웃이 곧 빠른 그레이스풀 디그레이드로 이어진다.
      # (접속 정보 host/port는 프로파일별 설정/Testcontainers가 주입하고, 여기서는 공통으로 타임아웃만 지정한다)
      timeout: ${REDIS_TIMEOUT:500ms}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - account_email
            client-name: Kakao
          google:
            client-id: ${GOOGLE_CLIENT_ID:394054923411-sej497m07628rmcbvad848sgoj4csqtf.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
            client-name: Google
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

jwt:
  # HS512 서명 키. 최소 64바이트(512bit) 이상이어야 한다.
  secret: ${JWT_SECRET}
  # 단위: 밀리초 (access 1시간, refresh 14일)
  expiration_time: ${JWT_EXPIRATION_TIME:3600000}
  refresh_expiration_time: ${JWT_REFRESH_EXPIRATION_TIME:1209600000}

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/redirect}
    # 로그인 실패(이메일 누락/중복 등) 시 리다이렉트할 프론트엔드 base. 뒤에 `/error?code={코드}`가 붙는다. (예: http://localhost:3000/error?code=USER-009)
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:3000}
    # ROLE_ADMIN 유저의 로그인 성공 시 리다이렉트할 어드민 프론트엔드 URI.
    admin-redirect-uri: ${OAUTH2_ADMIN_REDIRECT_URI:http://localhost:3001/oauth/redirect}
  # 인증 토큰 쿠키. local은 host-only/비-secure, 운영은 .도메인 공유 + secure 필요.
  auth:
    cookie:
      domain: ${AUTH_COOKIE_DOMAIN:}
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
  # 쿠키 인증이므로 와일드카드 불가. 프론트 오리진을 명시한다.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

meeple:
  match:
    batch:
      # 매일 12:00:00 1회 (Asia/Seoul). 운영에서 MEEPLE_MATCH_BATCH_CRON 환경변수로 덮어쓸 수 있다.
      cron: ${MEEPLE_MATCH_BATCH_CRON:0 0 12 * * *}
    recommended-team-batch:
      # 팀 없는 솔로 유저에게 가까운 결성 팀 추천. 매일 04:00 (Asia/Seoul). 운영에서 MEEPLE_RECOMMENDED_TEAM_BATCH_CRON 환경변수로 덮어쓸 수 있다.
      cron: ${MEEPLE_RECOMMENDED_TEAM_BATCH_CRON:0 0 4 * * *}
    team-match-batch:
      # 결성(ACTIVE) 팀끼리 가까운 권역으로 2:2 소개. 매일 13:00 (Asia/Seoul). 운영에서 MEEPLE_TEAM_MATCH_BATCH_CRON 환경변수로 덮어쓸 수 있다.
      cron: ${MEEPLE_TEAM_MATCH_BATCH_CRON:0 0 13 * * *}
    expire-batch:
      # 매시간 정각 (Asia/Seoul). 만료 후 최대 ~1시간 내 정리·환불. MEEPLE_EXPIRE_BATCH_CRON으로 조정
      cron: ${MEEPLE_EXPIRE_BATCH_CRON:0 0 * * * *}
  user:
    withdrawal:
      # 탈퇴 후 개인정보 보관 유예 기간(일). 기간 경과 후 파기 배치가 익명화한다.
      retention-days: 10
      purge-batch:
        # 매일 05:00 KST. MEEPLE_PURGE_WITHDRAWN_BATCH_CRON 환경변수로 조정 가능.
        cron: ${MEEPLE_PURGE_WITHDRAWN_BATCH_CRON:0 0 5 * * *}

logging:
  level:
    com.org.meeple: debug

# API 문서(springdoc): 기본 비활성으로 두어 운영 노출을 차단한다. local·test 프로파일에서만 켠다.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: "local | test"
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

---
# 로컬 프로파일에서는 매칭 배치를 1분마다 돌려 동작을 빠르게 확인한다. (운영 기본값은 매일 정오 0 0 12 * * *)
spring:
  config:
    activate:
      on-profile: local
meeple:
  match:
    batch:
      cron: ${MEEPLE_MATCH_BATCH_CRON:0 * * * * *}
    recommended-team-batch:
      # 팀 없는 솔로 유저에게 가까운 결성 팀 추천. 매일 04:00 (Asia/Seoul). 운영에서 MEEPLE_RECOMMENDED_TEAM_BATCH_CRON 환경변수로 덮어쓸 수 있다.
      cron: ${MEEPLE_RECOMMENDED_TEAM_BATCH_CRON:0 * * * * *}
    team-match-batch:
      # 로컬에서는 팀 매칭 배치도 1분마다 돌려 동작을 빠르게 확인한다. (운영 기본값은 매일 13:00)
      cron: ${MEEPLE_TEAM_MATCH_BATCH_CRON:0 * * * * *}
    expire-batch:
      cron: ${MEEPLE_EXPIRE_BATCH_CRON:0 * * * * *}
  user:
    withdrawal:
      retention-days: 10
      purge-batch:
        # 로컬에서는 1분마다 돌려 동작을 빠르게 확인한다. (운영 기본값은 매일 05:00)
        cron: ${MEEPLE_PURGE_WITHDRAWN_BATCH_CRON:0 * * * * *}
