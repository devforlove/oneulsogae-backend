services:
  mysql:
    image: mysql:8.4
    container_name: meeple-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meeple
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - meeple-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.4
    container_name: meeple-redis
    ports:
      - "6379:6379"
    volumes:
      - meeple-redis-data:/data

volumes:
  meeple-mysql-data:
  meeple-redis-data:
