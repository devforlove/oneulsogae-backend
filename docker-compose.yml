services:
  mysql:
    image: mysql:8.4
    container_name: meeple-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meeple
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - meeple-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.4
    container_name: meeple-redis
    ports:
      - "6379:6379"
    volumes:
      - meeple-redis-data:/data

  # 로컬 S3 에뮬레이터. 실제 AWS S3와 동일한 API를 4566 포트로 제공한다. (운영은 실제 S3)
  # 커뮤니티 LocalStack은 상태 영속성이 Pro 전용이라 재시작 시 S3 객체가 사라진다.
  # 이를 보완한 드롭인 이미지(gresau/localstack-persist)를 쓴다. 태그는 LocalStack 버전(3.x)을 따라간다.
  localstack:
    image: gresau/localstack-persist:3
    container_name: meeple-localstack
    environment:
      # S3만 띄운다. (다른 AWS 서비스는 불필요)
      SERVICES: s3
      AWS_DEFAULT_REGION: ap-northeast-2
      # LocalStack은 자격증명을 실제로 검증하지 않는다. 앱(application-local.yml)의 더미 값과 맞춰 둔다.
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      # 기동 완료(ready) 직후 실행돼 개발용 버킷을 만드는 초기화 스크립트.
      - ./docker/localstack/init/ready.d:/etc/localstack/init/ready.d
      # 이 이미지는 S3 객체·리소스 상태를 /persisted-data에 저장한다. 볼륨으로 재시작 간 유지.
      - meeple-localstack-data:/persisted-data

volumes:
  meeple-mysql-data:
  meeple-redis-data:
  meeple-localstack-data:
