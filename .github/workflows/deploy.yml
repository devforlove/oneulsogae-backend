name: deploy-backend

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build & test (Testcontainers E2E 포함)
        run: ./gradlew build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/devforlove/meeple-backend:latest
            ghcr.io/devforlove/meeple-backend:${{ github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=InstanceIds,Values=${{ vars.EC2_INSTANCE_ID }}" \
            --comment "deploy meeple-backend ${{ github.sha }}" \
            --parameters 'commands=["cd /opt/meeple && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"]' \
            --region "${{ vars.AWS_REGION }}" \
            --query "Command.CommandId" --output text)
          echo "SSM Command ID: $CMD_ID"

          # 명령이 등록될 시간을 잠깐 준 뒤 완료까지 대기
          sleep 5
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}" \
            --query "Status" --output text)
          echo "== STDOUT =="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}" \
            --query "StandardOutputContent" --output text
          echo "== STATUS: $STATUS =="
          if [ "$STATUS" != "Success" ]; then
            echo "== STDERR =="
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
              --region "${{ vars.AWS_REGION }}" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
