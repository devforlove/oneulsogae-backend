name: deploy-backend

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build & test (Testcontainers E2E 포함)
        run: ./gradlew build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/devforlove/meeple-backend:latest
            ghcr.io/devforlove/meeple-backend:${{ github.sha }}
            ghcr.io/devforlove/oneulsogae-backend:latest
            ghcr.io/devforlove/oneulsogae-backend:${{ github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=InstanceIds,Values=${{ vars.EC2_INSTANCE_ID }}" \
            --comment "deploy oneulsogae-backend ${{ github.sha }}" \
            --parameters 'commands=["cd /opt/oneulsogae && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"]' \
            --region "${{ vars.AWS_REGION }}" \
            --query "Command.CommandId" --output text)
          echo "SSM Command ID: $CMD_ID"

          # 완료까지 최대 10분(10초 x 60회) 폴링. 느린 이미지 pull에도 오탐 없이 대기.
          STATUS=Pending
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
              --region "${{ vars.AWS_REGION }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
          done

          echo "== STDOUT =="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}" \
            --query "StandardOutputContent" --output text || true
          echo "== FINAL STATUS: $STATUS =="
          if [ "$STATUS" != "Success" ]; then
            echo "== STDERR =="
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
              --region "${{ vars.AWS_REGION }}" \
              --query "StandardErrorContent" --output text || true
            exit 1
          fi
