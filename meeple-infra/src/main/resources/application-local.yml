spring:
  datasource:
    # connectionCollation을 DB/테이블과 동일한 utf8mb4_unicode_ci로 고정한다. (서버는 docker-compose에서 --collation-server=utf8mb4_unicode_ci)
    # 미지정 시 Connector/J가 연결 collation을 utf8mb4_0900_ai_ci로 잡아, unicode_ci 컬럼과의 문자열 비교에서 "Illegal mix of collations"가 발생한다.
    url: jdbc:mysql://localhost:3306/meeple?characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    # show-sql(stdout 직접 출력)과 org.hibernate.SQL 로거를 동시에 켜면 SQL이 두 번 찍힌다.
    # 로거 경로(org.hibernate.SQL + jdbc.bind)만 사용하므로 show-sql은 끈다.
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # use_sql_comments를 켜면 SQL 앞에 HQL 주석(/* ... */)이 함께 찍혀 SQL이 두 번 보이는 것처럼 된다. 끈다.
        use_sql_comments: false
        default_batch_fetch_size: 100

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

# 로컬 S3는 docker-compose의 LocalStack(4566)을 향한다. path-style + 더미 자격증명 필요.
# (버킷 meeple-local은 LocalStack 기동 시 init 스크립트가 생성한다. bucket·region은 application.yml 기본값 사용)
app:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:4566}
    path-style-access: true
    access-key: ${S3_ACCESS_KEY:test}
    secret-key: ${S3_SECRET_KEY:test}
