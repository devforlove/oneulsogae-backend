spring:
  datasource:
    # DB 접속 정보는 EC2 .env(환경변수)로 주입한다. 로컬(application-local.yml)과 달리 RDS 엔드포인트를 가리킨다.
    # connectionCollation은 로컬과 동일하게 utf8mb4_unicode_ci로 고정한다(컬럼 collation과의 "Illegal mix of collations" 방지).
    # useSSL=false: EC2↔RDS가 같은 VPC 프라이빗 구간이라 우선 비암호화로 시작한다(추후 RDS SSL 강화 가능).
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME:meeple}?characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      # 운영 기본은 validate(엔티티↔스키마 일치 검증만, DDL 변경 없음).
      # ⚠️ 빈 RDS 첫 배포에는 테이블이 없어 validate가 실패한다. 최초 1회만 JPA_DDL_AUTO=update로
      #    스키마를 생성한 뒤 그 값을 제거해 validate로 복귀한다. 장기적으론 Flyway 도입을 권장한다.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    # 운영에서는 SQL 로깅을 끈다(로컬 프로파일만 org.hibernate.SQL 로거를 켠다).
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
